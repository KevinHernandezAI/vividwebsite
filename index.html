<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#090d1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>EmporiumElite Storage Scout</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">EmporiumElite</p>
        <h1>Storage Scout</h1>
      </div>
      <button id="refreshBtn" class="btn">Refresh Feed</button>
    </header>

    <main>
      <section class="panel sticky-filters">
        <h2>RGV Auction Feed</h2>
        <div class="filters-grid">
          <label>City
            <select id="cityFilter"></select>
          </label>
          <label>Source
            <select id="sourceFilter"></select>
          </label>
          <label>Max Current Bid
            <input id="maxBidFilter" type="number" min="0" step="1" placeholder="Any" />
          </label>
          <label>Min Score
            <input id="minScoreFilter" type="number" min="0" max="100" step="1" placeholder="0" />
          </label>
          <label>Time Remaining (hrs)
            <input id="hoursFilter" type="number" min="0" step="1" placeholder="Any" />
          </label>
          <label>Sort
            <select id="sortBy">
              <option value="bestScore">Best score</option>
              <option value="lowestBid">Lowest bid</option>
              <option value="soonestEnding">Soonest ending</option>
              <option value="closestCity">Closest city</option>
              <option value="highestEstimatedValue">Highest estimated value</option>
            </select>
          </label>
        </div>
      </section>

      <section class="panel stats" id="stats"></section>

      <section id="auctionFeed" class="feed"></section>

      <section class="panel">
        <h2>Watchlist</h2>
        <div id="watchlist"></div>
      </section>

      <section class="panel">
        <h2>Source Settings</h2>
        <p class="muted">
          Safe mode: no auto-bidding and no account linking. Add public listing data manually or via approved APIs.
        </p>
        <form id="customCityForm" class="inline-form">
          <input id="customCity" placeholder="Add custom city" />
          <button class="btn secondary" type="submit">Add City</button>
        </form>
        <form id="manualListingForm" class="manual-form">
          <h3>Add Manual Listing</h3>
          <input id="manualTitle" required placeholder="Listing title" />
          <input id="manualFacility" required placeholder="Facility name" />
          <input id="manualCity" required placeholder="City" />
          <input id="manualBid" required type="number" min="0" step="1" placeholder="Current bid" />
          <input id="manualEnd" required type="datetime-local" />
          <input id="manualPickup" type="datetime-local" />
          <input id="manualImage" placeholder="Thumbnail URL (optional)" />
          <input id="manualLink" required type="url" placeholder="Original auction URL" />
          <input id="manualHints" placeholder="Hints (tools,totes,electronics,organized,trash...)" />
          <button class="btn" type="submit">Save Manual Listing</button>
        </form>
      </section>
    </main>

    <template id="auctionCardTemplate">
      <article class="auction-card">
        <img class="thumb" alt="Listing thumbnail" loading="lazy" />
        <div class="content">
          <div class="title-row">
            <h3></h3>
            <span class="score-pill"></span>
          </div>
          <p class="meta"></p>
          <p class="reason"></p>
          <div class="chips"></div>
          <div class="metrics"></div>
          <div class="actions"></div>
          <div class="planner"></div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
